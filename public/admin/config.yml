backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

display_url: https://rhcs.netlify.app/
logo_url: /logo.png

collections:
  # ========================================
  # PAGES COLLECTIONS
  # ========================================
  
  # --- HOME PAGE ---
  - name: "home_page"
    label: "Page: Home"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/home/hero.md"
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}

  # --- TREE TOURS PAGE ---
  - name: "tree_tours_page"
    label: "Page: Tree Tours"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/tree-tours/hero.md"
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
      - name: "visitor_information"
        label: "Visitor Information"
        file: "src/content/tree-tours/visitor-information.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Visitor Information" }
          - { name: "body", label: "Content", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list], hint: "Rules, What to Bring and Info for Visitors" }
      - name: "directions"
        label: "Directions"
        file: "src/content/tree-tours/directions.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Directions" }
          - name: "directions_content"
            label: "Directions Content"
            widget: "object"
            fields:
              - { label: "By Car", name: "by_car", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list] }
              - { label: "By Public Transit", name: "by_transit", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list] }
      - name: "maps"
        label: "Maps"
        file: "src/content/tree-tours/maps.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Maps" }
          - name: "map_list"
            label: "Maps & Links"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - name: "type"
                label: "Type of Link"
                widget: "select"
                options: ["File Upload (PDF/Image)", "External Link"]
              - name: "file"
                label: "Map File"
                widget: "file"
                required: false
              - name: "url"
                label: "External URL"
                widget: "string"
                required: false

  # ========================================
  # DYNAMIC CONTENT COLLECTIONS
  # =======================================

  # --- EVENTS ---
- name: "events"
  label: "Events"
  folder: "src/content/events"
  create: true
  slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
  fields:
    - name: "title"
      label: "Event Title"
      widget: "string"
      required: true
    
    - name: "day"
      label: "Event Date"
      widget: "datetime"
      date_format: "YYYY-MM-DD"
      time_format: false
      format: "YYYY-MM-DD"
      required: true
      hint: "Select the date of the event (events are typically one day every 3 months)"
    
    - name: "startTime"
      label: "Start Time"
      widget: "string"
      required: true
      pattern: ['^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$', "Must be in format HH:MM (e.g., 10:00 or 14:30)"]
      hint: "Enter start time in 24-hour format (HH:MM), e.g., 10:00"
    
    - name: "endTime"
      label: "End Time"
      widget: "string"
      required: true
      pattern: ['^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$', "Must be in format HH:MM (e.g., 11:00 or 15:30)"]
      hint: "Enter end time in 24-hour format (HH:MM), e.g., 11:00"
    
    - name: "location"
      label: "Location"
      widget: "string"
      required: false
      default: "Henry Esson Young (H.E.Y) Building"
    
    - name: "description"
      label: "Description"
      widget: "markdown"
      required: false
      modes: [rich_text]
      buttons: [bold, italic, link, bulleted-list, numbered-list]
    
    - name: "timezone"
      label: "Timezone"
      widget: "hidden"
      default: "America/Vancouver"
    
    - name: "slug"
      label: "Slug"
      widget: "string"
      required: false
      hint: "Leave empty to auto-generate from title"

  # ========================================
  # PAGES COLLECTIONS (CONTINUED)
  # ========================================

  # --- NEWS PAGE ---
  - name: "news_page"
    label: "Page: News"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/news/hero.md" 
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}

  # --- NEWS ITEMS ---
  - name: "news"
    label: "News Items"
    folder: "src/content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "title", label: "Post Title", widget: "string" }
      - { name: "date", label: "Publish Date", widget: "datetime", format: "YYYY-MM-DD" }
      - name: "images"
        label: "Images"
        widget: "list"
        required: false
        field:
          { name: "image", label: "Image", widget: "image" }
      - { name: "body", label: "Body", widget: "markdown" }

  # --- HISTORY PAGE ---
  - name: "history_page"
    label: "Page: History"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/history/hero.md"
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
      - name: "history_items"
        label: "History Timeline Items"
        file: "src/content/history/history-items.md"
        fields:
          - name: "items"
            label: "History Items"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list] }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Button", name: "button", widget: "object", required: false, fields: [
                  { label: "Text", name: "text", widget: "string", required: false },
                  { label: "URL", name: "url", widget: "string", required: false }
                ]}

  # --- GET INVOLVED PAGE ---
  - name: "get_involved_page"
    label: "Page: Get Involved"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/get-involved/hero.md"
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
      - name: "membership"
        label: "Membership"
        file: "src/content/get-involved/membership.md"
        fields: 
          - { name: "body", label: "Content", widget: "markdown" }
      - name: "donations"
        label: "Donations"
        file: "src/content/get-involved/donations.md"
        fields: 
          - { name: "body", label: "Content", widget: "markdown" }

  # --- ABOUT US PAGE ---
  - name: "about_us_page"
    label: "Page: About Us"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/about/hero.md"
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
      - name: "mission"
        label: "Mission & Vision"
        file: "src/content/about/mission-vision.md"
        fields: 
          - { name: "body", label: "Content", widget: "markdown" }
      - name: "history"
        label: "Founding History"
        file: "src/content/about/history.md"
        fields: 
          - { name: "body", label: "Content", widget: "markdown" }

  # --- PHOTO GALLERY PAGE ---
  - name: "photo_gallery_page"
    label: "Page: Photo Gallery"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/photo-gallery/hero.md"
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}

  # --- PHOTO GALLERY ALBUMS ---
  - name: "photo_gallery"
    label: "Photo Gallery Albums"
    folder: "src/content/albums"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "title", label: "Album Title", widget: "string" }
      - { name: "date", label: "Date", widget: "datetime", format: "YYYY-MM-DD" }
      - { name: "description", label: "Description", widget: "markdown", required: false }
      - name: "photos"
        label: "Photos"
        widget: "list"
        summary: "{{fields.image}}"
        min: 1
        field:
          { name: "image", label: "Image", widget: "image" }

  # ========================================
  # SITE SETTINGS
  # ========================================

  # --- SETTINGS ---
  - name: "settings"
    label: "Settings"
    files:
      - name: "social-media"
        label: "Social Media"
        file: "src/content/settings/social-media.json"
        fields:
          - { name: "facebook", label: "Facebook URL", widget: "string", required: false }
          - { name: "instagram", label: "Instagram URL", widget: "string", required: false }
          - { name: "twitter", label: "Twitter URL", widget: "string", required: false }