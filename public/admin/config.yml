backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

display_url: https://rhcs.netlify.app/
logo_url: /logo.png

collections:
  # ========================================
  # PAGES COLLECTIONS
  # ========================================
  
  # --- HOME PAGE ---
  - name: "home_page"
    label: "Page: Home"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/home/hero.md"
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}

  # --- TREE TOURS PAGE ---
  - name: "tree_tours_page"
    label: "Page: Tree Tours"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/tree-tours/hero.md"
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
      
      - name: "visitor_information"
        label: "Visitor Information"
        file: "src/content/tree-tours/visitor-information.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Visitor Information" }
          - { name: "body", label: "Content", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list], hint: "Rules, What to Bring and Info for Visitors" }
      
      - name: "directions"
        label: "Directions"
        file: "src/content/tree-tours/directions.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Directions" }
          - name: "directions_content"
            label: "Directions Content"
            widget: "object"
            fields:
              - { label: "By Car", name: "by_car", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list] }
              - { label: "By Public Transit", name: "by_transit", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list] }

      - name: "maps"
        label: "Maps & Location"
        file: "src/content/tree-tours/maps.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Maps" }
          - label: "Location Settings"
            name: "location"
            widget: "object"
            collapsed: false
            summary: "Meeting Point: {{fields.address}}"
            fields:
              - { name: "title", label: "Location Title", widget: "string", default: "Location: Henry Esson Young Building", hint: "Title displayed above the map" }
              - { name: "googleMapsEmbedUrl", label: "Google Maps Embed URL", widget: "string", required: true, hint: "Go to Google Maps → Search location → Share → Embed a map → Copy the URL from src='...' (the part between quotes)" }
              - { name: "address", label: "Address", widget: "string", required: true, maxlength: 100, hint: "Full address of the meeting point (max 100 characters)" }
              - { name: "googleMapsDirectUrl", label: "Google Maps Link", widget: "string", required: true, hint: "Go to Google Maps → Search location → Share → Copy link (e.g., https://maps.app.goo.gl/...)" }
          - name: "map_list"
            label: "Downloadable Maps & Resources"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - name: "type"
                label: "Type of Link"
                widget: "select"
                options: ["File Upload (PDF/Image)", "External Link"]
              - { name: "file", label: "Map File", widget: "file", required: false }
              - { name: "url", label: "External URL", widget: "string", required: false }

      - name: "virtual_tours"
        label: "Virtual Tours"
        file: "src/content/tree-tours/virtual-tours.md"
        fields:
          - { name: "sectionTitle", label: "Section Title", widget: "string", default: "Virtual Tree Tour Videos", hint: "Main heading for the virtual tours section" }
          - name: "videos"
            label: "Videos"
            widget: "list"
            summary: "{{fields.title}}"
            hint: "Add, edit, or remove virtual tour videos. Videos will appear in the order listed here."
            fields:
              - { label: "Video Title", name: "title", widget: "string", required: true, hint: "Title of the video (displayed above the video player)" }
              - { label: "Description", name: "description", widget: "text", required: true, hint: "Brief description of what viewers will see in this video" }
              - { label: "YouTube URL", name: "youtubeUrl", widget: "string", required: true, pattern: ['^https:\/\/(www\.)?youtube\.com\/watch\?v=.+|^https:\/\/youtu\.be\/.+', "Must be a valid YouTube URL"], hint: "Paste the full YouTube URL (e.g., https://www.youtube.com/watch?v=NfeEnBo0CwQ or https://youtu.be/NfeEnBo0CwQ)" }

  # --- Tree Tour Calendar (nested under Tree Tours) ---
  - name: "tree_tour_events"
    label: "Page: Tree Tours Calendar"
    label_singular: "Tree Tours Event"
    folder: "src/content/tree-tours/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "title", label: "Event Title", widget: "string", required: true }
      - { name: "day", label: "Event Date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD", required: true, hint: "Select the date of the event" }
      - { name: "startTime", label: "Start Time", widget: "string", required: true, pattern: ['^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$', "Must be in format HH:MM (e.g., 10:00 or 14:30)"], hint: "Enter start time in 24-hour format (HH:MM), e.g., 10:00" }
      - { name: "endTime", label: "End Time", widget: "string", required: true, pattern: ['^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$', "Must be in format HH:MM (e.g., 12:00 or 16:30)"], hint: "Enter end time in 24-hour format (HH:MM), e.g., 11:00" }
      - { name: "location", label: "Location", widget: "string", required: false, default: "Henry Esson Young (H.E.Y) Building" }
      - { name: "description", label: "Description", widget: "markdown", required: false, modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list] }
      - { name: "timezone", label: "Timezone", widget: "hidden", default: "America/Vancouver" }

