backend:
  name: git-gateway
  branch: main
  media_folder: "public/uploads"
  public_folder: "/uploads"
  display_url: https://rhcs.netlify.app/
  logo_url: /logo.png

collections:
  # --- TREE TOURS PAGE ---
  - name: "tree_tours_page"
    label: "Page: Tree Tours"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/tree-tours/hero.md"
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string" },
              { label: "URL", name: "url", widget: "string" }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string" },
              { label: "URL", name: "url", widget: "string" }
            ]}
      - name: "visitor_information"
        label: "Visitor Information"
        file: "src/content/tree-tours/visitor-information.md"
        fields:
          - { name: "title", label: "Page Title", widget: "string", default: "Visitor Information" }
          - { name: "body", label: "Content", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, quote, bulleted-list, numbered-list], hint: "Rules, What to Bring and Info for Visitors" }
      - name: "directions"
        label: "Directions"
        file: "src/content/tree-tours/directions.md"
        fields:
          - { name: "title", label: "Page Title", widget: "string", default: "Directions" }
          - name: "directions_content" # Renamed to avoid conflict with 'directions' widget
            label: "Directions Content"
            widget: "object"
            fields:
              - { label: "By Car", name: "by_car", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, quote, bulleted-list, numbered-list] }
              - { label: "By Public Transit", name: "by_transit", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, quote, bulleted-list, numbered-list] }
      - name: "maps"
        label: "Maps"
        file: "src/content/tree-tours/maps.md"
        fields:
          - { name: "title", label: "Page Title", widget: "string", default: "Maps" }
          - name: "map_list"
            label: "Maps & Links"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - name: "type"
                label: "Type of Link"
                widget: "select"
                options: ["File Upload (PDF/Image)", "External Link"]
              - name: "file"
                label: "Map File"
                widget: "file"
                required: false
              - name: "url"
                label: "External URL"
                widget: "string"
                required: false

  # --- EVENTS COLLECTION ---
  - name: "events"
    label: "Events"
    folder: "src/content/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - name: "startDateTime"
        label: "Start Date and Time"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: "hh:mm A"
        format: "YYYY-MM-DD hh:mm A"
      - name: "endDateTime"
        label: "End Date and Time"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: "hh:mm A"
        format: "YYYY-MM-DD hh:mm A"
      - { name: "location", label: "Location", widget: "string", required: false }
      - { name: "timezone", label: "Timezone", widget: "hidden", default: "America/Vancouver" }
      - { name: "description", label: "Description", widget: "markdown", required: false }

  # --- NEWS COLLECTION ---
  - name: "news_listing_hero" 
    label: "News Listing Hero"
    file: "src/content/news/hero.md"
    fields:
      - { name: "title", label: "Hero Title", widget: "string" }
      - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
      - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
      - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
          { label: "Text", name: "text", widget: "string" },
          { label: "URL", name: "url", widget: "string" }
        ]}
      - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
          { label: "Text", name: "text", widget: "string" },
          { label: "URL", name: "url", widget: "string" }
        ]}

  - name: "news" 
    label: "News Items"
    folder: "src/content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "title", label: "Post Title", widget: "string" }
      - { name: "date", label: "Publish Date", widget: "datetime", format: "YYYY-MM-DD" }
      - name: "images"
        label: "Images"
        widget: "list"
        required: false
        field:
          { name: "image", label: "Image", widget: "image" }
      - { name: "body", label: "Body", widget: "markdown" }

  # --- PHOTO GALLERY COLLECTION ---
  - name: "photo_gallery_listing_hero"
    label: "Photo Gallery Listing Hero"
    file: "src/content/photo-gallery/hero.md"
    fields:
      - { name: "title", label: "Hero Title", widget: "string" }
      - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
      - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
      - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
          { label: "Text", name: "text", widget: "string" },
          { label: "URL", name: "url", widget: "string" }
        ]}
      - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
          { label: "Text", name: "text", widget: "string" },
          { label: "URL", name: "url", widget: "string" }
        ]}

  - name: "photo_gallery" 
    label: "Photo Gallery Albums"
    folder: "src/content/albums"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "title", label: "Album Title", widget: "string" }
      - { name: "date", label: "Date", widget: "datetime", format: "YYYY-MM-DD" }
      - { name: "description", label: "Description", widget: "markdown", required: false }
      - name: "photos"
        label: "Photos"
        widget: "list"
        summary: "{{fields.image}}"
        min: 1
        field:
          { name: "image", label: "Image", widget: "image" }

  # --- ABOUT US PAGE ---
  - name: "about-us-page"
    label: "Page: About Us"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/about/hero.md"
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string" },
              { label: "URL", name: "url", widget: "string" }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string" },
              { label: "URL", name: "url", widget: "string" }
            ]}
      - name: "mission"
        label: "Mission & Vision"
        file: "src/content/about/mission-vision.md"
        fields: [{ name: "body", label: "Content", widget: "markdown" }]
      - name: "history"
        label: "Founding History"
        file: "src/content/about/history.md"
        fields: [{ name: "body", label: "Content", widget: "markdown" }]

  # --- GET INVOLVED PAGE ---
  - name: "get-involved-page"
    label: "Page: Get Involved"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/get-involved/hero.md"
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string" },
              { label: "URL", name: "url", widget: "string" }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string" },
              { label: "URL", name: "url", widget: "string" }
            ]}
      - name: "membership"
        label: "Membership"
        file: "src/content/get-involved/membership.md"
        fields: [{ name: "body", label: "Content", widget: "markdown" }]
      - name: "donations"
        label: "Donations"
        file: "src/content/get-involved/donations.md"
        fields: [{ name: "body", label: "Content", widget: "markdown" }]

  # --- SETTINGS COLLECTION ---
  - name: "settings"
    label: "Settings"
    files:
      - name: "social-media"
        label: "Social Media"
        file: "src/content/settings/social-media.json"
        fields:
          - { name: "facebook", label: "Facebook URL", widget: "string", required: false }
          - { name: "instagram", label: "Instagram URL", widget: "string", required: false }
          - { name: "twitter", label: "Twitter URL", widget: "string", required: false }