backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

display_url: https://rhcs.netlify.app/
logo_url: /logo.png

collections:
  # ========================================
  # PAGES COLLECTIONS
  # ========================================
  
  # --- HOME PAGE ---
  - name: "home_page"
    label: "Page: Home"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/home/hero.md"
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
      
      - name: "intro_mission"
        label: "Introduction & Mission Section"
        file: "src/content/home/intro-mission.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Welcome to RHCS" }
          - { name: "body", label: "Introduction Text", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list], hint: "Brief introduction and mission statement highlight" }
          - name: "images"
            label: "Carousel Images"
            widget: "list"
            summary: "{{fields.image}}"
            min: 1
            field:
              { name: "image", label: "Image", widget: "image" }
          - { label: "Learn More Button", name: "learnMoreButton", widget: "object", fields: [
              { label: "Text", name: "text", widget: "string", default: "Learn More" },
              { label: "URL", name: "url", widget: "string", default: "/about-us" }
            ]}

      - name: "media_section"
        label: "RHCS in Media Section"
        file: "src/content/home/media.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "RHCS in Media" }
          - name: "mediaItems"
            label: "Media Items"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Type", name: "type", widget: "select", options: ["YouTube Video", "Audio"] }
              - { label: "YouTube URL", name: "youtubeUrl", widget: "string", required: false, hint: "For YouTube videos" }
              - { label: "Audio File", name: "audioFile", widget: "file", required: false, hint: "For audio files (.wav, .mp3)" }

      - name: "virtual_tour"
        label: "Virtual Tour Section"
        file: "src/content/home/virtual-tour.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Virtual Tree Tour" }
          - { name: "description", label: "Description", widget: "text" }
          - { label: "YouTube URL", name: "youtubeUrl", widget: "string", required: true }

      - name: "get_involved_cards"
        label: "Get Involved Cards"
        file: "src/content/home/get-involved-cards.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Get Involved" }
          - name: "cards"
            label: "Cards"
            widget: "list"
            max: 3
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Icon", name: "icon", widget: "select", options: ["Membership", "Donate", "Volunteer"] }
              - { label: "Description", name: "description", widget: "text", maxlength: 150 }
              - { label: "Link URL", name: "url", widget: "string" }

  # --- TREE TOURS PAGE ---
  - name: "tree_tours_page"
    label: "Page: Tree Tours"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/tree-tours/hero.md"
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
      
      - name: "visitor_information"
        label: "Visitor Information"
        file: "src/content/tree-tours/visitor-information.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Visitor Information" }
          - { name: "body", label: "Content", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list], hint: "Rules, What to Bring and Info for Visitors" }
      
      - name: "directions"
        label: "Directions"
        file: "src/content/tree-tours/directions.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Directions" }
          - name: "directions_content"
            label: "Directions Content"
            widget: "object"
            fields:
              - { label: "By Car", name: "by_car", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list] }
              - { label: "By Public Transit", name: "by_transit", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list] }

      - name: "maps"
        label: "Maps & Location"
        file: "src/content/tree-tours/maps.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Maps" }
          - label: "Location Settings"
            name: "location"
            widget: "object"
            collapsed: false
            summary: "Meeting Point: {{fields.address}}"
            fields:
              - { name: "title", label: "Location Title", widget: "string", default: "Location: Henry Esson Young Building", hint: "Title displayed above the map" }
              - { name: "googleMapsEmbedUrl", label: "Google Maps Embed URL", widget: "string", required: true, hint: "Go to Google Maps → Search location → Share → Embed a map → Copy the URL from src='...' (the part between quotes)" }
              - { name: "address", label: "Address", widget: "string", required: true, maxlength: 100, hint: "Full address of the meeting point (max 100 characters)" }
              - { name: "googleMapsDirectUrl", label: "Google Maps Link", widget: "string", required: true, hint: "Go to Google Maps → Search location → Share → Copy link (e.g., https://maps.app.goo.gl/...)" }
          - name: "map_list"
            label: "Downloadable Maps & Resources"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - name: "type"
                label: "Type of Link"
                widget: "select"
                options: ["File Upload (PDF/Image)", "External Link"]
              - { name: "file", label: "Map File", widget: "file", required: false }
              - { name: "url", label: "External URL", widget: "string", required: false }

      - name: "virtual_tours"
        label: "Virtual Tours"
        file: "src/content/tree-tours/virtual-tours.md"
        fields:
          - { name: "sectionTitle", label: "Section Title", widget: "string", default: "Virtual Tree Tour Videos", hint: "Main heading for the virtual tours section" }
          - name: "videos"
            label: "Videos"
            widget: "list"
            summary: "{{fields.title}}"
            hint: "Add, edit, or remove virtual tour videos. Videos will appear in the order listed here."
            fields:
              - { label: "Video Title", name: "title", widget: "string", required: true, hint: "Title of the video (displayed above the video player)" }
              - { label: "Description", name: "description", widget: "text", required: true, hint: "Brief description of what viewers will see in this video" }
              - { label: "YouTube URL", name: "youtubeUrl", widget: "string", required: true, pattern: ['^https:\/\/(www\.)?youtube\.com\/watch\?v=.+|^https:\/\/youtu\.be\/.+', "Must be a valid YouTube URL"], hint: "Paste the full YouTube URL (e.g., https://www.youtube.com/watch?v=NfeEnBo0CwQ or https://youtu.be/NfeEnBo0CwQ)" }

  # --- Tree Tour Calendar (nested under Tree Tours) ---
  - name: "tree_tour_events"
    label: "Page: Tree Tours Calendar"
    label_singular: "Tree Tours Event"
    folder: "src/content/tree-tours/events"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "title", label: "Event Title", widget: "string", required: true }
      - { name: "day", label: "Event Date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD", required: true, hint: "Select the date of the event" }
      - { name: "startTime", label: "Start Time", widget: "string", required: true, pattern: ['^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$', "Must be in format HH:MM (e.g., 10:00 or 14:30)"], hint: "Enter start time in 24-hour format (HH:MM), e.g., 10:00" }
      - { name: "endTime", label: "End Time", widget: "string", required: true, pattern: ['^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$', "Must be in format HH:MM (e.g., 12:00 or 16:30)"], hint: "Enter end time in 24-hour format (HH:MM), e.g., 11:00" }
      - { name: "location", label: "Location", widget: "string", required: false, default: "Henry Esson Young (H.E.Y) Building" }
      - { name: "description", label: "Description", widget: "markdown", required: false, modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list] }
      - { name: "timezone", label: "Timezone", widget: "hidden", default: "America/Vancouver" }

  # --- NEWS PAGE ---
  - name: "news_page"
    label: "Page: News"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/news/hero.md" 
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}

  # --- NEWS ITEMS ---
  - name: "news"
    label: "News Items"
    folder: "src/content/news/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { name: "title", label: "Post Title", widget: "string" }
      - { name: "date", label: "Publish Date", widget: "datetime", format: "YYYY-MM-DD" }
      - name: "images"
        label: "Images"
        widget: "list"
        required: false
        field:
          { name: "image", label: "Image", widget: "image" }
      - { name: "body", label: "Body", widget: "markdown" }

  # --- HISTORY PAGE ---
  - name: "history_page"
    label: "Page: History"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/history/hero.md"
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
      
      - name: "history_items"
        label: "History Timeline Items"
        file: "src/content/history/history-items.md"
        fields:
          - name: "items"
            label: "History Items"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list] }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Button", name: "button", widget: "object", required: false, fields: [
                  { label: "Text", name: "text", widget: "string", required: false },
                  { label: "URL", name: "url", widget: "string", required: false }
                ]}

  # --- GET INVOLVED PAGE ---
  - name: "get_involved_page"
    label: "Page: Get Involved"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/get-involved/hero.md"
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
      
      - name: "membership"
        label: "Membership Section"
        file: "src/content/get-involved/membership.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Join the Society" }
          - { name: "body", label: "Content", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list] }
          - name: "pricing"
            label: "Membership Pricing"
            widget: "object"
            fields:
              - { name: "title", label: "Pricing Title", widget: "string", default: "Annual Membership" }
              - { name: "amount", label: "Amount", widget: "string", default: "$5.00" }
              - { name: "dueDate", label: "Due Date", widget: "string", default: "Due April 1st" }
          - name: "paymentMethods"
            label: "Payment Methods"
            widget: "list"
            fields:
              - { name: "method", label: "Payment Method", widget: "string" }
              - { name: "icon", label: "Icon", widget: "select", options: ["card", "donation", "email"], default: "card" }
              - { name: "details", label: "Payment Details", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link] }
          - { name: "note", label: "Additional Note", widget: "text", required: false }
          - { name: "membershipFormPDF", label: "Membership Form PDF", widget: "file", required: false, hint: "Upload the membership application form" }
      
      - name: "donations"
        label: "Donations Section"
        file: "src/content/get-involved/donations.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Support Our Work" }
          - { name: "body", label: "Content", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list] }
          - name: "paymentOptions"
            label: "Payment Options"
            widget: "list"
            fields:
              - { name: "method", label: "Payment Method", widget: "string" }
              - { name: "icon", label: "Icon", widget: "select", options: ["card", "donation", "email"], default: "donation" }
              - { name: "details", label: "Payment Details", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link] }
              - { name: "preferred", label: "Mark as Preferred", widget: "boolean", default: false, required: false }
          - { name: "taxReceiptNote", label: "Tax Receipt Note", widget: "text", required: false }
      
      - name: "volunteer"
        label: "Volunteer Section"
        file: "src/content/get-involved/volunteer.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Volunteer Opportunities" }
          - { name: "description", label: "Section Description", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list] }

  # --- VOLUNTEER POSITIONS ---
  - name: "volunteer_positions"
    label: "Volunteer Positions"
    label_singular: "Volunteer Position"
    folder: "src/content/get-involved/volunteer-positions"
    create: true
    slug: "{{slug}}"
    identifier_field: "title"
    fields:
      - { name: "title", label: "Position Title", widget: "string", required: true }
      - { name: "description", label: "Description", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list], required: true }
      - { name: "timeCommitment", label: "Time Commitment", widget: "string", required: false, hint: "e.g., 10 hours per week for 3 months" }
      - name: "contactType"
        label: "Contact Method"
        widget: "select"
        options: ["Email", "External Link"]
        default: "Email"
      - { name: "contactEmail", label: "Contact Email", widget: "string", required: false, hint: "e.g., trees@rhcs.org" }
      - { name: "contactURL", label: "Contact URL", widget: "string", required: false, hint: "e.g., https://forms.gle/1234" }
      - { name: "icon", label: "Icon", widget: "select", options: ["Events", "Guided Walks", "Safety Support", "Gardening"], default: "Events" }
      - { name: "order", label: "Display Order", widget: "number", default: 0, value_type: "int", min: 0, hint: "Lower numbers appear first" }

  # --- ABOUT US PAGE ---
  - name: "about_us_page"
    label: "Page: About Us"
    files:
      - name: "hero"
        label: "Hero Section"
        file: "src/content/about/hero.md"
        fields:
          - { name: "title", label: "Hero Title", widget: "string" }
          - { name: "description", label: "Hero Description", widget: "text", maxlength: 250 }
          - { label: "Background Image", name: "backgroundImage", widget: "image", required: false }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: false, fields: [
              { label: "Text", name: "text", widget: "string", required: false },
              { label: "URL", name: "url", widget: "string", required: false }
            ]}
      
      - name: "mission"
        label: "Mission"
        file: "src/content/about/mission.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Our Mission" }
          - { name: "body", label: "Content", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list] }
      
      - name: "vision"
        label: "Vision"
        file: "src/content/about/vision.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Our Vision" }
          - { name: "body", label: "Content", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list] }
      
      - name: "what_we_do"
        label: "What We Do"
        file: "src/content/about/what-we-do.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "What We Do" }
          - { name: "body", label: "Content", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list] }
          - { name: "image", label: "Optional Image", widget: "image", required: false }
      
      - name: "why_founded"
        label: "Why Was RHCS Founded"
        file: "src/content/about/why-founded.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Why Was RHCS Founded" }
          - { name: "body", label: "Content", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list] }
      
      - name: "achievements"
        label: "Our Achievements"
        file: "src/content/about/achievements.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Our Achievements" }
          - { name: "body", label: "Achievements Description", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list], hint: "List of achievements (use bullet points)" }
          - name: "images"
            label: "Achievement Images"
            widget: "list"
            summary: "{{fields.image}}"
            min: 1
            field:
              { name: "image", label: "Image", widget: "image" }
      
      - name: "memoriam_section"
        label: "In Memoriam Section"
        file: "src/content/about/memoriam.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "In Memoriam" }
          - { name: "description", label: "Section Description", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list], required: false }
      
      - name: "get_involved"
        label: "Get Involved Section"
        file: "src/content/about/get-involved.md"
        fields:
          - { name: "title", label: "Section Title", widget: "string", default: "Get Involved" }
          - { name: "body", label: "Content", widget: "markdown", modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list], hint: "Invitation to become a member or volunteer (max 250 characters)", maxlength: 250 }
          - name: "images"
            label: "Carousel Images"
            widget: "list"
            summary: "{{fields.image}}"
            min: 1
            required: false
            hint: "Add images of volunteers and members to inspire visitors"
            field:
              { name: "image", label: "Image", widget: "image" }
          - { label: "Primary Button", name: "primaryButton", widget: "object", required: true, fields: [
              { label: "Text", name: "text", widget: "string", default: "Become a Member" },
              { label: "URL", name: "url", widget: "string", default: "/get-involved#membership" }
            ]}
          - { label: "Secondary Button", name: "secondaryButton", widget: "object", required: true, fields: [
              { label: "Text", name: "text", widget: "string", default: "Volunteer With Us" },
              { label: "URL", name: "url", widget: "string", default: "/get-involved#volunteer" }
            ]}

  # --- IN MEMORIAM ENTRIES ---
  - name: "memoriam_entries"
    label: "In Memoriam Entries"
    label_singular: "Memorial Entry"
    folder: "src/content/about/memoriam"
    create: true
    slug: "{{slug}}"
    identifier_field: "fullName"
    fields:
      - { name: "fullName", label: "Full Name", widget: "string", required: true }
      - { name: "dateOfBirth", label: "Date of Birth", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: true }
      - { name: "dateOfDeath", label: "Date of Death", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: true }
      - { name: "description", label: "Description", widget: "markdown", required: false, modes: [rich_text], buttons: [bold, italic, link, bulleted-list, numbered-list], hint: "Optional remembrance text" }
      - name: "images"
        label: "Images"
        widget: "list"
        required: false
        max: 5
        summary: "{{fields.image}}"
        hint: "Add up to 5 images (optional)"
        field:
          { name: "image", label: "Image", widget: "image" }

  # --- SETTINGS ---
  - name: "settings"
    label: "Settings"
    files:
      - name: "social-media"
        label: "Social Media"
        file: "src/content/settings/social-media.json"
        fields:
